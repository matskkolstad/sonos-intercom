announce:
  name: Announce
  description: >-
    Play a text-to-speech message, a recording and/or a chime on one or more
    Sonos speakers, with optional ducking of currently playing audio.
  fields:
    message:
      name: Message
      description: Text to read aloud (text-to-speech). Use this OR audio_url.
      example: "Dinner is ready"
      selector:
        text:
    audio_url:
      name: Audio URL
      description: URL to a ready audio file (e.g. a recording). Use this OR message.
      example: "http://homeassistant.local:8123/local/sonos_intercom/intercom_123.mp3"
      selector:
        text:
    chime:
      name: Chime
      description: Optional chime played before the message (or on its own).
      example: airport
      selector:
        select:
          mode: dropdown
          options:
            - label: "None"
              value: "none"
            - label: "Airport"
              value: "airport"
            - label: "Ding-dong"
              value: "ding_dong"
            - label: "Soft ping"
              value: "soft_ping"
            - label: "Marimba"
              value: "marimba"
            - label: "Gong"
              value: "gong"
    chime_volume:
      name: Chime volume
      description: >-
        Loudness of the chime relative to the message (0-100, 100 = same level).
        Only applies when a chime is combined with a message or recording.
      example: 60
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    targets:
      name: Speakers
      description: The Sonos media_player entities to play on.
      required: true
      selector:
        entity:
          multiple: true
          filter:
            - domain: media_player
    volume:
      name: Volume
      description: >-
        Volume 0-100. A single number applies to all speakers; an object maps
        entity_id to volume for per-speaker levels.
      example: 35
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    announce:
      name: Announce (duck)
      description: Lower current audio, play the message on top, then restore.
      default: true
      selector:
        boolean:
    tts_engine:
      name: TTS engine
      description: TTS engine id for the message (overrides the configured default).
      example: "tts.google_translate_en_com"
      selector:
        text:
    language:
      name: TTS language
      description: Language code for the TTS message (engine-dependent).
      example: "nb"
      selector:
        text:
    voice:
      name: TTS voice
      description: Voice for the TTS message, passed as a TTS option (engine-specific).
      example: "Jenny"
      selector:
        text:
    source:
      name: Source label
      description: Free-text label of who/where the message is from (shown in history).
      example: "Kjøkkenet"
      selector:
        text:
    sync:
      name: Synced playback
      description: Temporarily group multiple speakers for synchronized playback.
      default: true
      selector:
        boolean:

replay:
  name: Replay a message
  description: >-
    Replay an announcement from the history. Optionally override the target
    speakers and/or the volume; otherwise the stored ones are reused.
  fields:
    index:
      name: History index
      description: Which message to replay (0 = most recent).
      default: 0
      selector:
        number:
          min: 0
          max: 200
          mode: box
    targets:
      name: Speakers
      description: >-
        Speakers to replay on. If omitted, the speakers from the stored
        announcement are reused.
      selector:
        entity:
          multiple: true
          filter:
            - domain: media_player
    volume:
      name: Volume
      description: Volume 0-100. If omitted, the stored volume is reused.
      example: 35
      selector:
        number:
          min: 0
          max: 100
          mode: slider

acknowledge:
  name: Acknowledge / reply
  description: >-
    Send a quick acknowledgement (chime, optionally with a short message) back
    to the last sender, or to the given speakers.
  fields:
    targets:
      name: Speakers
      description: >-
        Speakers to acknowledge on. If omitted, the last sender's speakers are
        used.
      selector:
        entity:
          multiple: true
          filter:
            - domain: media_player
    message:
      name: Message
      description: Optional short text to read aloud after the chime.
      example: "Mottatt"
      selector:
        text:
    chime:
      name: Chime
      description: Chime to play (defaults to soft_ping).
      example: soft_ping
      selector:
        text:
    volume:
      name: Volume
      description: Volume 0-100.
      example: 35
      selector:
        number:
          min: 0
          max: 100
          mode: slider
